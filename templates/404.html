<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | LIA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* Estilos base consistentes con tu proyecto */
        body {
            background-color: #0f172a; /* bg-slate-900 */
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7); /* bg-slate-800 con opacidad */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5); /* border-slate-700 */
        }
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            background-image: linear-gradient(to right, #818cf8, #a855f7); /* from-indigo-400 to-purple-500 */
        }
        /* Para que particles.js se quede al fondo */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen relative overflow-hidden flex items-center justify-center">

    <div id="particles-js"></div>

    <main class="relative z-10 px-4 w-full max-w-2xl mx-auto" data-aos="zoom-in" data-aos-duration="800">
        <div class="glass-card p-10 md:p-16 rounded-3xl text-center shadow-2xl shadow-indigo-500/10">
            
            <div class="w-24 h-24 bg-slate-800/80 rounded-2xl flex items-center justify-center mx-auto mb-8 border border-slate-700 animate-bounce">
                <i class="fa-solid fa-plug-circle-xmark text-5xl text-indigo-400"></i>
            </div>

            <h1 class="text-7xl md:text-9xl font-extrabold tracking-tighter mb-4">
                <span class="text-gradient">404</span>
            </h1>
            
            <h2 class="text-2xl md:text-3xl font-bold mb-4 text-slate-200">Señal interrumpida</h2>
            <p class="text-slate-400 text-lg mb-10 max-w-md mx-auto leading-relaxed">
                El url que intentas buscar no existe, fue movido o ha sido desconectado del servidor central de LIA.
            </p>

            <a href="/" class="inline-flex items-center gap-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold py-3 px-8 rounded-full transition-all transform hover:scale-105 shadow-lg shadow-indigo-500/25">
                <i class="fa-solid fa-house"></i>
                Volver al inicio
            </a>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        // Inicializar animaciones
        AOS.init({ once: true });

        // Inicializar partículas (con la misma configuración de tu index)
        particlesJS("particles-js", { 
            "particles": { 
                "number": { "value": 40 }, 
                "color": { "value": "#38bdf8" }, 
                "opacity": { "value": 0.3 }, 
                "size": { "value": 3 }, 
                "line_linked": { "enable": true, "distance": 150, "color": "#818cf8", "opacity": 0.2 }, 
                "move": { "enable": true, "speed": 1 } 
            }, 
            "interactivity": { 
                "events": { "onhover": { "enable": true, "mode": "grab" } } 
            } 
        });
    </script>
</body>
</html>
